<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/login.css" />
    <title>Entre</title>
  </head>
  <body>
    <!doctype html>
    <html lang="pt-br">
      <head>
        <meta charset="UTF-8" />
        <title>Login</title>
        <link rel="stylesheet" href="style.css" />
      </head>
      <body>
        <div class="container">
          <!-- LOGIN -->
          <div id="login">
            <h2>Login</h2>
            <input type="text" id="loginUser" placeholder="Usuário" />
            <input type="password" id="loginPass" placeholder="Senha" />
            <button onclick="fazerLogin()">Entrar</button>
            <p>
              Não tem conta?
              <span onclick="mostrarCadastro()">Criar conta</span>
            </p>
          </div>

          <!-- CADASTRO -->
          <div id="cadastro" style="display: none">
            <h2>Cadastro</h2>

            <label>Nome completo</label>
            <input type="text" id="nome" />
            <span class="erro" id="erroNome"></span>

            <label>Nome da mãe</label>
            <input type="text" id="nomeMae" />
            <span class="erro" id="erroNomeMae"></span>

            <label>Data de nascimento</label>
            <input type="date" id="dataNascimento" />

            <label>Sexo</label>
            <select id="sexo">
              <option value="">Selecione</option>
              <option>Masculino</option>
              <option>Feminino</option>
            </select> <br>

            <label>CPF</label>
            <input type="text" id="cpf" placeholder="123.456.789-00" maxlength="14"/>
            <span class="erro" id="erroCpf"></span>

            <label>Telefone celular</label>
            <input type="tel" id="celular" placeholder="(XX) XXXXX-XXXX" />

            <label>Telefone fixo</label>
            <input type="tel" id="fixo" placeholder="(XX) XXXXX-XXXX" />

            <label>Endereço</label>  <!-- ATENÇÃO -->
            <input type="text" id="endereco" />

            <label>Nome de usuário</label>
            <input type="text" id="cadUser"/>

            <label>Senha</label>
            <input type="password" id="cadPass"/>
            <span class="erro" id="erroSenha"></span>

            <label>Confirmar senha</label>
            <input type="password" id="confirmarSenha" />
            <span class="erro" id="erroConfirmar"></span>

            <button onclick="cadastrar()">Cadastrar</button>
            <p>
              Já tem conta? <span onclick="mostrarLogin()">Fazer login</span>
            </p>
          </div>
        </div>

        <script src="javascript/script.js"></script>
      </body>
    </html>
  </body>
</html>
