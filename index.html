<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/login.css" />
    <title>Entre</title>
  </head>
  <body>
    <div class="container">
      <!-- LOGIN -->
      <div id="login">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Usuário" />
        <input type="password" id="loginPass" placeholder="Senha" />
        <button onclick="fazerLogin()">Entrar</button>
        <p>
          Não tem conta?
          <span onclick="mostrarCadastro()">Criar conta</span>
        </p>
      </div>

      <!-- CADASTRO -->
      <div id="cadastro" style="display: none">
        <h2>Cadastro</h2>

        <!-- NOME COMPLETO -->
        <label>Nome completo</label>
        <input type="text" id="nome" maxlength="60" />
        <span class="erro" id="erroNome"></span>

        <!-- NOME DA MÃE -->
        <label>Nome da mãe</label>
        <input type="text" id="nomeMae" maxlength="60" />
        <span class="erro" id="erroNomeMae"></span>

        <!-- DATA DE NASCIMENTO -->
        <label>Data de nascimento</label>
        <input type="date" id="dataNascimento" />

        <!-- SEXO -->
        <label>Sexo</label>
        <select id="sexo">
          <option value="">Selecione</option>
          <option>Masculino</option>
          <option>Feminino</option>
        </select>
        <br />

        <!-- CPF -->
        <label>CPF</label>
        <input
          type="text"
          id="cpf"
          maxlength="14"
          placeholder="123.456.789-00"
          oninput="mascaraCPF(this)"
        />
        <span class="erro" id="erroCpf"></span>

        <!-- TELEFONE CELULAR -->
        <label>Telefone celular</label>
        <input
          type="tel"
          id="celular"
          maxlength="15"
          placeholder="(XX) XXXXX-XXXX"
          oninput="mascaraTel(this)"
        />

        <!-- TELEFONE FIXO -->
        <label>Telefone fixo</label>
        <input
          type="tel"
          id="fixo"
          maxlength="15"
          placeholder="(XX) XXXXX-XXXX"
          oninput="mascaraTel(this)"
        />

        <!-- CEP -->
        <h3>Endereço Completo</h3>

        <div class="cep-linha">
          <div style="flex: 2">
            <label>CEP</label>
            <input type="text" id="cep" placeholder="00000-000" oninput="mascaraCep(this)" maxlength="9" />
          </div>
          <button type="button" id="btnBuscar">Buscar</button>
        </div>

        <div class="campo">
          <label>Endereço</label>
          <input type="text" id="rua" class="readonly" readonly />
        </div>

        <div class="row">
          <div class="campo">
            <label>Número</label>
            <input type="text" id="numero" />
          </div>
          <div class="campo">
            <label>Complemento</label>
            <input type="text" id="complemento" />
          </div>
        </div>

        <div class="campo">
          <label>Bairro</label>
          <input type="text" id="bairro" class="readonly" readonly />
        </div>

        <div class="row">
          <div class="campo" style="flex: 3">
            <label>Cidade</label>
            <input type="text" id="cidade" class="readonly" readonly />
          </div>
          <div class="campo" style="flex: 1">
            <label>UF</label>
            <input type="text" id="uf" class="readonly" readonly />
          </div>
        </div>

        <label>Nome de usuário</label>
        <input type="text" id="cadUser" />

        <label>Senha</label>
        <input type="password" id="cadPass" />
        <span class="erro" id="erroSenha"></span>

        <label>Confirmar senha</label>
        <input type="password" id="confirmarSenha" />
        <span class="erro" id="erroConfirmar"></span>

        <button onclick="cadastrar()">Cadastrar</button>
        <p>Já tem conta? <span onclick="mostrarLogin()">Fazer login</span></p>
      </div>
    </div>
    <script src="javascript/script.js"></script>
  </body>
</html>
